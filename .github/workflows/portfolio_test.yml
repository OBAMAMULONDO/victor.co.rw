name: Testing Portfolio If No Errors

on:
  pull_request:
    branches: [main]
  issues:
    types: [opened]

# ─── PERMISSIONS FOR AUTO-MERGE ───
permissions:
  issues: write
  pull-requests: write
  contents: write  # Required for auto-merge
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: First interaction
        uses: actions/first-interaction@v1.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Welcome to my portfolio repo! Thanks for opening your first issue. 😊"
          pr-message: "Thank you for your first Pull Request! The automated tests are running now."

      # Pull the code into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup the environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install and run quality checks
      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
     

      - name: Build portfolio
        run: npm run build

  # ─── NEW: AUTO-MERGE ON SUCCESS ───
  auto-merge:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge for PRs
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            
            try {
              await github.rest.pulls.enableAutoMerge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash'
              });
              console.log(`✅ Auto-merge enabled for PR #${pr.number}`);
            } catch (error) {
              console.log(`⚠️ Auto-merge info: ${error.message}`);
            }
