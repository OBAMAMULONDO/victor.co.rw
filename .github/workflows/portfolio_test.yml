name: Testing Portfolio If No Errors

on:
  pull_request:
    branches: [main]

jobs:
  test:
   
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint
     

      - name: Build portfolio
        run: npm run build
